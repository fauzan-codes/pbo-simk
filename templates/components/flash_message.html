{% if messages %}
    <div class="flex flex-col gap-3 mb-6">
        {% for message in messages %}
            <div class="flex items-center justify-between p-4 rounded-xl border text-sm 
                {% if message.tags == 'error' %} bg-red-50 text-red-700 border-red-200
                {% elif message.tags == 'success' %} bg-green-50 text-green-700 border-green-200
                {% elif message.tags == 'warning' %} bg-amber-50 text-amber-700 border-amber-200
                {% else %} bg-blue-50 text-blue-700 border-blue-200 {% endif %}">
                
                <div class="flex items-center gap-2">
                    {% if message.tags == 'success' %}
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                        </svg>
                    {% else %}
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                        </svg>
                    {% endif %}
                    <span class="font-medium">{{ message }}</span>
                </div>

                <button type="button" onclick="this.parentElement.remove()" class="p-1 rounded-md opacity-60 hover:opacity-100 hover:bg-black/5 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>

            </div>
        {% endfor %}
    </div>
{% endif %}
