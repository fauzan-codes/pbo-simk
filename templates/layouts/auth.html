{% extends 'layouts/app.html' %}
{% load static %}

{% block layout_content %}

<div class="min-h-screen flex">

  <div class="hidden lg:flex w-[45%] min-h-screen flex-col justify-between p-12 relative overflow-hidden bg-cover bg-center"
       style="background-image: url('{% static 'img/auth.webp' %}');">
    
    <div class="absolute inset-0 z-0 opacity-80"
         style="background: linear-gradient(160deg, #0c2d48 0%, #0f4c75 40%, #0ea5e9 100%)">
    </div>

    <div class="absolute -top-20 -right-20 w-80 h-80 rounded-full bg-white/10 z-10"></div>
    <div class="absolute -bottom-16 -left-16 w-72 h-72 rounded-full bg-white/10 z-10"></div>

    <div class="relative z-20 flex items-center gap-3">
      <div class="w-11 h-11 rounded-xl bg-white/90 border border-white/20 flex items-center justify-center backdrop-blur-sm p-0.5">
        <img src="{% static 'img/logo.webp' %}" alt="Logo SIMK" class="w-full h-full object-contain">
      </div>
      <div>
        <p class="text-white font-semibold text-lg leading-none">SIMK</p>
        <p class="text-white/70 text-[11px] tracking-widest uppercase mt-0.5">Sistem Informasi Manajemen Klinik</p>
      </div>
    </div>
    
    <div class="relative z-20"></div>
  </div>

  <div class="flex-1 flex items-center justify-center px-6 py-12 bg-white">
    <div class="w-full max-w-sm">

      <div class="flex items-center gap-2 mb-6 lg:hidden">
        <div class="w-9 h-9 rounded-lg bg-slate-50 border border-slate-200 flex items-center justify-center p-1.5">
          <img src="{% static 'img/logo.webp' %}" alt="Logo SIMK" class="w-full h-full object-contain">
        </div>
        <p class="font-semibold text-slate-800">SIMK</p>
      </div>

      {% include 'components/flash_message.html' %} 
        
      {% block auth_content %}{% endblock %}
    </div>
  </div>

</div>

{% endblock %}
